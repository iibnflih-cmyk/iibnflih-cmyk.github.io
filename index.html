<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مكتبة الكتب الإسلامية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #D4A55E;
            --primary-light: #E8D0A9;
            --primary-dark: #B58A4A;
            --secondary: #8B4513;
            --secondary-light: #A05A2B;
            --light-bg: #FFFDF8;
            --card-bg: #FFFFFF;
            --text-dark: #2A2118;
            --text-medium: #5A4A3A;
            --text-light: #8A7B6A;
            --shadow: 0 6px 20px rgba(139, 69, 19, 0.12);
            --shadow-hover: 0 12px 30px rgba(139, 69, 19, 0.18);
            --border: #F0E6D6;
            --green: #2E8B57;
            --green-light: #4CAF7A;
            --gold: #FFD166;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--light-bg);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            overflow-x: hidden;
        }

        /* إصلاح نافذة التحميل */
        .download-popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2999;
            backdrop-filter: blur(2px);
        }

        .download-popup-overlay.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .download-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            z-index: 3000;
            text-align: center;
            min-width: 280px;
            max-width: 90%;
            animation: popIn 0.3s ease;
        }

        .download-popup.active {
            display: block;
        }

        .download-popup i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1.2rem;
            display: block;
            animation: spin 1s linear infinite;
        }

        .download-popup p {
            color: var(--text-dark);
            font-size: 1.1rem;
            margin: 0;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* شريط حالة التطبيق */
        .app-status-bar {
            height: var(--safe-top);
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary-dark) 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        /* الهيدر المحسّن */
        header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1rem 1.2rem 2.2rem 1.2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom-right-radius: 0 0 40px 40px;
            border-bottom-left-radius: 0 0 40px 40px;
            box-shadow: 0 6px 25px rgba(139, 69, 19, 0.25);
            margin-top: var(--safe-top);
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .logo {
            font-size: 2rem;
            margin-bottom: 0.6rem;
            color: white;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3));
            display: inline-block;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 0.4rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .tagline {
            font-size: 0.85rem;
            opacity: 0.95;
            max-width: 320px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
            font-weight: 300;
        }

        /* الحاوية الرئيسية - استجابة متقدمة */
        .container {
            width: 100%;
            max-width: 100%;
            padding: 0 1rem;
            margin: 0 auto;
        }

        /* شريط البحث - تصميم جوال محسّن */
        .search-section {
            margin: -1.8rem auto 2rem auto;
            width: 100%;
            padding: 0 0.8rem;
            position: relative;
            z-index: 10;
        }

        .search-box {
            background: var(--card-bg);
            padding: 0.9rem 1rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 0.8rem;
            border: 2px solid var(--primary);
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }

        #searchInput {
            flex: 1;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Tajawal';
            background: #FFFDF9;
            color: var(--text-dark);
            min-height: 44px;
        }

        #searchInput::placeholder {
            color: var(--text-light);
            opacity: 0.7;
        }

        #searchInput:focus {
            outline: none;
            background: #FFFEFC;
            box-shadow: inset 0 0 0 2px rgba(212, 165, 94, 0.2);
        }

        .search-icon {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            z-index: 2;
            font-size: 1rem;
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal';
            min-height: 44px;
            min-width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(212, 165, 94, 0.3);
        }

        /* قسم الكتب المميزة */
        .featured-section {
            margin-bottom: 2.5rem;
            width: 100%;
        }

        .section-header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 0 0.5rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 0.4rem;
        }

        .section-subtitle {
            color: var(--text-light);
            font-size: 0.85rem;
            font-weight: 300;
        }

        /* شبكة الكتب - استجابة متقدمة للجوال */
        .vertical-books-grid {
            display: grid;
            gap: 1.2rem;
            width: 100%;
            padding: 0 0.5rem;
        }

        /* الكروت الجديدة مع العنوان على الخلفية */
        .book-card-vertical {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 1.5px solid var(--border);
            height: 300px;
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
        }

        /* غلاف الكتاب مع العنوان عليه - بدون خلفية */
        .book-cover {
            height: 140px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem;
            position: relative;
            overflow: hidden;
        }

        .cover-title {
            color: white;
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.4;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
            z-index: 2;
            width: 100%;
            max-height: 100%;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            padding: 0;
            /* تم إزالة الخلفية هنا */
        }

        .book-info {
            padding: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* المؤلف بمساحة سطرين */
        .book-author {
            color: var(--primary-dark);
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.4;
            min-height: 2.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* الأزرار */
        .book-actions {
            display: flex;
            gap: 0.6rem;
            margin-top: auto;
            width: 100%;
        }

        .read-btn-vertical, .download-btn-vertical {
            flex: 1;
            color: white;
            text-align: center;
            padding: 0.8rem 0.5rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            font-family: 'Tajawal';
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            min-height: 42px;
        }

        .read-btn-vertical {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        }

        .download-btn-vertical {
            background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
        }

        .read-btn-vertical:active, .download-btn-vertical:active {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* نتائج البحث */
        #searchResults {
            display: none;
            margin-top: 2.5rem;
            width: 100%;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0 0.5rem;
        }

        .results-title {
            font-size: 1.2rem;
            color: var(--secondary);
            font-weight: 700;
        }

        .back-to-featured {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal';
            min-height: 36px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* الفوتر */
        footer {
            text-align: center;
            padding: 1.5rem 1rem;
            margin-top: 3rem;
            background: linear-gradient(135deg, var(--secondary) 0%, #5D2E0F 100%);
            color: white;
            border-top-right-radius: 30px;
            border-top-left-radius: 30px;
        }

        .footer-content {
            max-width: 100%;
            margin: 0 auto;
        }

        .footer-logo {
            font-size: 1.8rem;
            margin-bottom: 0.8rem;
            color: var(--gold);
        }

        .footer-text {
            opacity: 0.9;
            font-size: 0.85rem;
            line-height: 1.6;
            font-weight: 300;
        }

        /* تحسينات الاستجابة المتقدمة للجوال */

        /* هواتف صغيرة جداً (≤ 360px) */
        @media (max-width: 360px) {
            html {
                font-size: 14px;
            }

            header {
                padding: 0.8rem 1rem 1.8rem 1rem;
                border-bottom-right-radius: 0 0 30px 30px;
                border-bottom-left-radius: 0 0 30px 30px;
            }

            .logo {
                font-size: 1.6rem;
            }

            h1 {
                font-size: 1.1rem;
            }

            .tagline {
                font-size: 0.75rem;
                max-width: 280px;
            }

            .search-section {
                margin: -1.5rem auto 1.5rem auto;
                padding: 0 0.5rem;
            }

            .search-box {
                flex-direction: column;
                gap: 0.7rem;
                padding: 0.8rem;
            }

            .search-btn {
                width: 100%;
                padding: 0.8rem;
            }

            #searchInput {
                padding: 0.7rem 1rem 0.7rem 2.5rem;
                min-height: 42px;
            }

            .vertical-books-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 0 0.5rem;
            }

            .book-card-vertical {
                height: 280px;
            }

            .book-cover {
                height: 120px;
                padding: 0.6rem;
            }

            .cover-title {
                font-size: 0.9rem;
                -webkit-line-clamp: 3;
            }

            .book-info {
                padding: 0.8rem;
            }

            .book-author {
                font-size: 0.85rem;
                margin-bottom: 0.8rem;
                min-height: 2.6em;
                -webkit-line-clamp: 2;
            }

            .book-actions {
                gap: 0.5rem;
            }

            .read-btn-vertical, .download-btn-vertical {
                padding: 0.7rem 0.4rem;
                font-size: 0.8rem;
                min-height: 40px;
            }

            footer {
                padding: 1.2rem 0.8rem;
                border-top-right-radius: 25px;
                border-top-left-radius: 25px;
            }
        }

        /* هواتف عادية (361px - 480px) */
        @media (min-width: 361px) and (max-width: 480px) {
            html {
                font-size: 15px;
            }

            .vertical-books-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
                padding: 0 0.6rem;
            }

            .book-card-vertical {
                height: 290px;
                max-width: 320px;
                margin: 0 auto;
            }

            .book-cover {
                height: 130px;
            }

            .cover-title {
                font-size: 0.95rem;
                -webkit-line-clamp: 3;
            }

            .book-author {
                -webkit-line-clamp: 2;
                min-height: 2.8em;
            }

            .search-box {
                flex-direction: column;
            }

            .search-btn {
                width: 100%;
            }
        }

        /* هواتف كبيرة / أجهزة لوحية صغيرة (481px - 768px) */
        @media (min-width: 481px) and (max-width: 768px) {
            .vertical-books-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.3rem;
                padding: 0 0.8rem;
            }

            .book-card-vertical {
                height: 300px;
            }

            .book-cover {
                height: 135px;
            }

            .cover-title {
                font-size: 1rem;
                -webkit-line-clamp: 3;
            }

            .book-author {
                -webkit-line-clamp: 2;
                min-height: 2.8em;
            }

            .search-box {
                flex-direction: row;
            }

            .search-btn {
                width: auto;
            }
        }

        /* أجهزة لوحية متوسطة (769px - 1024px) */
        @media (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 95%;
                padding: 0 1.5rem;
            }

            .vertical-books-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1.5rem;
                padding: 0;
            }

            .book-card-vertical {
                height: 320px;
            }

            .book-cover {
                height: 145px;
            }

            .cover-title {
                font-size: 1.05rem;
                -webkit-line-clamp: 3;
            }

            .book-author {
                -webkit-line-clamp: 2;
                min-height: 2.8em;
                font-size: 0.95rem;
            }

            header {
                padding: 1.2rem 2rem 2.5rem 2rem;
            }

            h1 {
                font-size: 1.6rem;
            }

            .tagline {
                font-size: 0.95rem;
            }
        }

        /* كمبيوتر صغير (1025px - 1200px) */
        @media (min-width: 1025px) and (max-width: 1200px) {
            .container {
                max-width: 1200px;
                padding: 0 2rem;
            }

            .vertical-books-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.7rem;
                padding: 0;
            }

            .book-card-vertical {
                height: 340px;
            }

            .book-cover {
                height: 155px;
            }

            .cover-title {
                font-size: 1.1rem;
                -webkit-line-clamp: 4;
            }

            .book-author {
                -webkit-line-clamp: 2;
                min-height: 2.8em;
                font-size: 1rem;
            }

            header {
                padding: 1.5rem 3rem 3rem 3rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .tagline {
                font-size: 1rem;
                max-width: 500px;
            }
        }

        /* كمبيوتر كبير (≥ 1201px) */
        @media (min-width: 1201px) {
            .container {
                max-width: 1400px;
                padding: 0 3rem;
            }

            .vertical-books-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 2rem;
                padding: 0;
            }

            .book-card-vertical {
                height: 360px;
                max-width: 320px;
                margin: 0 auto;
            }

            .book-cover {
                height: 165px;
            }

            .cover-title {
                font-size: 1.15rem;
                -webkit-line-clamp: 4;
            }

            .book-author {
                -webkit-line-clamp: 2;
                min-height: 2.8em;
                font-size: 1.05rem;
                line-height: 1.5;
            }

            header {
                padding: 1.8rem 4rem 3.5rem 4rem;
            }

            h1 {
                font-size: 2rem;
            }

            .tagline {
                font-size: 1.1rem;
                max-width: 600px;
            }

            .search-box {
                max-width: 900px;
            }

            .search-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 16px rgba(212, 165, 94, 0.4);
            }

            .read-btn-vertical:hover, .download-btn-vertical:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
            }

            .book-card-vertical:hover {
                transform: translateY(-8px);
                box-shadow: var(--shadow-hover);
            }
        }

        /* تحسينات للوضع الأفقي على الجوال */
        @media (max-height: 600px) and (orientation: landscape) {
            .vertical-books-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .book-card-vertical {
                height: 260px;
            }

            .book-cover {
                height: 110px;
            }

            .cover-title {
                font-size: 0.9rem;
                -webkit-line-clamp: 2;
            }

            .book-author {
                font-size: 0.85rem;
                -webkit-line-clamp: 2;
                min-height: 2.6em;
            }

            .book-actions {
                flex-direction: column;
                gap: 0.5rem;
            }
        }

        /* تحسينات للأجهزة ذات الشاشات الطويلة */
        @media (min-height: 800px) and (max-width: 480px) {
            .book-card-vertical {
                height: 320px;
            }

            .book-cover {
                height: 150px;
            }

            .cover-title {
                -webkit-line-clamp: 4;
                font-size: 1rem;
            }

            .book-author {
                -webkit-line-clamp: 2;
                min-height: 2.8em;
                font-size: 0.95rem;
            }
        }

        /* هواتف طويوووولة (مثل iPhone 14 Pro Max) */
        @media (min-height: 850px) and (max-width: 430px) {
            .book-card-vertical {
                height: 340px;
            }

            .book-cover {
                height: 160px;
            }

            .cover-title {
                -webkit-line-clamp: 4;
                font-size: 1.05rem;
            }

            .book-author {
                -webkit-line-clamp: 2;
                min-height: 2.8em;
                font-size: 1rem;
            }
        }

        /* تحسينات لشاشات صغيرة جداً وعالية الكثافة */
        @media (max-width: 320px) {
            .book-card-vertical {
                height: 270px;
            }

            .book-cover {
                height: 115px;
            }

            .cover-title {
                font-size: 0.85rem;
                -webkit-line-clamp: 3;
            }

            .book-author {
                font-size: 0.8rem;
                -webkit-line-clamp: 2;
                min-height: 2.4em;
            }

            .book-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-status-bar"></div>

    <header>
        <div class="header-content">
            <div class="logo">📚</div>
            <h1>مكتبة الكتب الإسلامية</h1>
            <p class="tagline">كتب إسلامية منتقاة للتحميل المجاني</p>
        </div>
    </header>

    <div class="container">
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن كتاب أو مؤلف..." autocomplete="off">
                <button class="search-btn" id="searchBtn">
                    <i class="fas fa-search"></i> بحث
                </button>
            </div>
        </div>

        <section class="featured-section">
            <div class="section-header">
                <h2 class="section-title">كتب لك</h2>
                <p class="section-subtitle">مجموعة مختارة من الكتب الإسلامية</p>
            </div>

            <div id="booksContainer" class="vertical-books-grid">
                <div class="loading">
                    <i class="fas fa-book-open fa-spin"></i>
                    <p>جاري تحميل الكتب المميزة...</p>
                </div>
            </div>
        </section>

        <div id="searchResults">
            <div class="results-header">
                <h3 class="results-title">نتائج البحث</h3>
                <button class="back-to-featured" id="backToFeatured">
                    <i class="fas fa-arrow-right"></i> رجوع
                </button>
            </div>
            <div id="resultsContainer" class="vertical-books-grid"></div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">📚</div>
            <p class="footer-text">مكتبة الكتب الإسلامية</p>
            <p class="footer-text">تواصل معنا لنصائح او ارشادات</p>
        </div>
    </footer>

    <!-- Download Popup Fixed -->
    <div class="download-popup-overlay" id="downloadOverlay"></div>
    <div class="download-popup" id="downloadPopup">
        <i class="fas fa-download"></i>
        <p>جاري تحميل الملف...</p>
    </div>

    <script>
        const GITHUB_JSON_URL = "https://raw.githubusercontent.com/iibnflih-cmyk/thedata/refs/heads/main/arabic_books.json";

        const FALLBACK_BOOKS = [
            {
                "title": "فقه العبادات للمبتدئين مع شرح مفصل للأحكام",
                "author": "عبدالله بن صالح",
                "file_url": "https://example.com/books/fiqh.pdf"
            },
            {
                "title": "التفسير الميسر للقرآن الكريم كاملاً",
                "author": "محمد الأمين",
                "file_url": "https://example.com/books/tafsir.pdf"
            },
            {
                "title": "السيرة النبوية الشريفة كاملة",
                "author": "أحمد بن خالد",
                "file_url": "https://example.com/books/seerah.pdf"
            },
            {
                "title": "الأربعون النووية مع شرح الأحاديث النبوية",
                "author": "الإمام النووي",
                "file_url": "https://example.com/books/arbaeen.pdf"
            },
            {
                "title": "رياض الصالحين من كلام سيد المرسلين",
                "author": "الإمام النووي",
                "file_url": "https://example.com/books/riyad.pdf"
            },
            {
                "title": "مختصر صحيح البخاري مع التعليقات",
                "author": "ابن كثير",
                "file_url": "https://example.com/books/bukhari.pdf"
            },
            {
                "title": "الشفا بتعريف حقوق المصطفى صلى الله عليه وسلم",
                "author": "القاضي عياض",
                "file_url": "https://example.com/books/shifa.pdf"
            },
            {
                "title": "حصن المسلم من أذكار الكتاب والسنة",
                "author": "سعيد بن وهف",
                "file_url": "https://example.com/books/hisn.pdf"
            },
            {
                "title": "الأذكار النووية مع شرح وتوضيح",
                "author": "الإمام النووي",
                "file_url": "https://example.com/books/azkar.pdf"
            },
            {
                "title": "تفسير ابن كثير مع فوائد وتنبيهات",
                "author": "ابن كثير",
                "file_url": "https://example.com/books/ibn-kathir.pdf"
            },
            {
                "title": "بلوغ المرام من أدلة الأحكام كاملة",
                "author": "ابن حجر العسقلاني",
                "file_url": "https://example.com/books/bulugh.pdf"
            },
            {
                "title": "العقيدة الطحاوية مع شرح المعاني والأحكام",
                "author": "الإمام الطحاوي",
                "file_url": "https://example.com/books/aqeedah.pdf"
            },
            {
                "title": "الروح لابن القيم مع فوائد عظيمة",
                "author": "ابن قيم الجوزية",
                "file_url": "https://example.com/books/rooh.pdf"
            },
            {
                "title": "زاد المعاد في هدي خير العباد",
                "author": "ابن قيم الجوزية",
                "file_url": "https://example.com/books/zad.pdf"
            },
            {
                "title": "مدارج السالكين بين منازل إياك نعبد وإياك نستعين",
                "author": "ابن قيم الجوزية",
                "file_url": "https://example.com/books/madarig.pdf"
            }
        ];

        let allBooks = [];

        function getRandomBooks(books, count = 12) {
            if (books.length <= count) return [...books];
            const shuffled = [...books].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        function displayBooks(books, containerId) {
            const container = document.getElementById(containerId);

            if (books.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search fa-2x"></i>
                        <h3>لم يتم العثور على كتب</h3>
                        <p>حاول استخدام كلمات بحث مختلفة</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';

            books.forEach(book => {
                const bookCard = document.createElement('div');
                bookCard.className = 'book-card-vertical';
                
                const cleanTitle = (book.title || 'كتاب').replace(/[^\w\u0600-\u06FF\s]/gi, '').trim();
                
                bookCard.innerHTML = `
                    <div class="book-cover">
                        <div class="cover-title">${book.title || 'بدون عنوان'}</div>
                    </div>
                    <div class="book-info">
                        <p class="book-author"><i class="fas fa-user-pen"></i> ${book.author || 'مؤلف غير معروف'}</p>
                        <div class="book-actions">
                            <a href="${book.file_url || '#'}" class="read-btn-vertical" target="_blank" rel="noopener noreferrer" ${!book.file_url ? 'style="opacity:0.5;cursor:not-allowed;pointer-events:none;"' : ''}>
                                <i class="fas fa-book-open"></i> اقرأ
                            </a>
                            <button class="download-btn-vertical" onclick="downloadFile(event, '${book.file_url || ''}', '${cleanTitle}')" ${!book.file_url ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>
                                <i class="fas fa-download"></i> تحميل
                            </button>
                        </div>
                    </div>
                `;

                container.appendChild(bookCard);
            });
        }

        function searchBooks() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

            if (!searchTerm) {
                document.getElementById('searchResults').style.display = 'none';
                document.getElementById('booksContainer').style.display = 'grid';
                return;
            }

            const filteredBooks = allBooks.filter(book => {
                const titleMatch = book.title && book.title.toLowerCase().includes(searchTerm);
                const authorMatch = book.author && book.author.toLowerCase().includes(searchTerm);
                return titleMatch || authorMatch;
            });

            document.getElementById('booksContainer').style.display = 'none';
            document.getElementById('searchResults').style.display = 'block';
            displayBooks(filteredBooks, 'resultsContainer');
        }

        async function loadBooks() {
            const booksContainer = document.getElementById('booksContainer');

            try {
                const response = await fetch(GITHUB_JSON_URL);

                if (response.ok) {
                    try {
                        const data = await response.json();
                        if (Array.isArray(data) && data.length > 0) {
                            allBooks = data;
                            console.log('✅ تم تحميل الكتب:', allBooks.length, 'كتاب');
                        } else {
                            throw new Error('البيانات فارغة');
                        }
                    } catch (jsonError) {
                        console.warn('⚠️ استخدام البيانات البديلة');
                        allBooks = FALLBACK_BOOKS;
                    }
                } else {
                    throw new Error('خطأ في التحميل');
                }
            } catch (error) {
                console.warn('⚠️ استخدام البيانات البديلة');
                allBooks = FALLBACK_BOOKS;
            }

            const featuredBooks = getRandomBooks(allBooks, 12);
            displayBooks(featuredBooks, 'booksContainer');
        }

        async function downloadFile(event, fileUrl, filename) {
            if (!fileUrl || !fileUrl.startsWith('http')) {
                event.preventDefault();
                alert('رابط التحميل غير متوفر');
                return;
            }
            
            event.preventDefault();
            
            const popup = document.getElementById('downloadPopup');
            const overlay = document.getElementById('downloadOverlay');
            popup.classList.add('active');
            overlay.classList.add('active');
            
            const cleanFilename = filename.replace(/[^\w\u0600-\u06FF\s]/gi, '').trim();
            const finalFilename = `${cleanFilename || 'كتاب'}.pdf`;
            
            try {
                const response = await fetch(fileUrl);
                
                if (!response.ok) {
                    throw new Error('فشل في جلب الملف');
                }
                
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = finalFilename;
                link.style.display = 'none';
                document.body.appendChild(link);
                
                link.click();
                
                setTimeout(() => {
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(blobUrl);
                    popup.classList.remove('active');
                    overlay.classList.remove('active');
                }, 100);
                
            } catch (error) {
                console.error('خطأ في التحميل:', error);
                
                setTimeout(() => {
                    window.open(fileUrl, '_blank');
                    popup.classList.remove('active');
                    overlay.classList.remove('active');
                }, 800);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadBooks();

            document.getElementById('searchBtn').addEventListener('click', searchBooks);
            document.getElementById('searchInput').addEventListener('keyup', function(event) {
                if (event.key === 'Enter') searchBooks();
            });

            document.getElementById('backToFeatured').addEventListener('click', function() {
                document.getElementById('searchResults').style.display = 'none';
                document.getElementById('booksContainer').style.display = 'grid';
                document.getElementById('searchInput').value = '';
            });

            document.getElementById('searchInput').addEventListener('input', function() {
                if (this.value.trim() === '') {
                    document.getElementById('searchResults').style.display = 'none';
                    document.getElementById('booksContainer').style.display = 'grid';
                }
            });

            document.addEventListener('touchstart', function(event) {
                if (event.touches.length > 1) {
                    event.preventDefault();
                }
            }, { passive: false });
        });
    </script>
</body>
</html>
